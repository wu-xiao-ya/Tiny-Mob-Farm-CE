name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Prepare ForgeGradle cache directories
        run: mkdir -p ~/.gradle/caches/forge_gradle/minecraft_user_repo/de/oceanlabs/mcp/mcp_config/1.16.5-20210115.111550

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Select release artifact
        id: artifact
        run: |
          artifact="$(find build/libs -maxdepth 1 -type f -name 'TinyMobFarm-CE-*.jar' ! -name '*-dev.jar' | head -n 1)"
          if [ -z "$artifact" ]; then
            echo "No release jar found" >&2
            exit 1
          fi
          echo "path=$artifact" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tiny Mob Farm CE ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ steps.artifact.outputs.path }}
